<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PTT Live Monitor - อ.กันทรลักษ์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600&display=swap');
        
        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: #f8fafc; 
            color: #334155; 
            -webkit-tap-highlight-color: transparent;
        }

        ::-webkit-scrollbar { width: 0px; background: transparent; }

        .status-pulse { animation: pulse 3s infinite; }
        @keyframes pulse { 
            0% { opacity: 1; transform: scale(1); } 
            50% { opacity: 0.5; transform: scale(1.05); } 
            100% { opacity: 1; transform: scale(1); } 
        }

        .fuel-card { 
            border-radius: 2.5rem;
            background: #ffffff;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: transform 0.3s ease;
        }

        .progress-track {
            background-color: #f1f5f9;
            height: 18px;
            border-radius: 999px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: 999px;
            transition: width 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .logo-glow {
            filter: drop-shadow(0 8px 15px rgba(37, 99, 235, 0.15));
        }

        .station-indicator {
            position: relative;
            padding-left: 1rem;
        }
        .station-indicator::before {
            content: '';
            position: absolute;
            left: 0;
            top: 15%;
            height: 70%;
            width: 5px;
            background: #2563eb;
            border-radius: 10px;
        }
    </style>
</head>
<body class="pb-12">
    <!-- ส่วนหัว: โลโก้ใหญ่เด่นชัด ธีม Minimal สบายตา -->
    <div class="bg-white/90 backdrop-blur-xl sticky top-0 z-50 px-6 py-7 border-b border-slate-100 shadow-sm">
        <div class="max-w-xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-5">
                <div class="relative flex items-center justify-center">
                    <div class="absolute w-24 h-24 bg-blue-50 rounded-full opacity-30 animate-pulse"></div>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Ptt_logo.svg" 
                         alt="PTT Logo" class="w-20 h-20 object-contain logo-glow relative z-10">
                </div>
                <div>
                    <h1 class="text-xl font-bold text-slate-800 tracking-tight leading-none">ระดับน้ำมันคงเหลือ</h1>
                    <div class="flex items-center gap-2 mt-2">
                        <span class="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded border border-blue-100 uppercase tracking-widest">Live Monitor</span>
                        <p class="text-[10px] text-slate-400 font-light">อ.กันทรลักษ์</p>
                    </div>
                </div>
            </div>
            <div class="text-right">
                <div id="last-sync" class="text-xs font-medium text-slate-400 bg-slate-50 px-3 py-1.5 rounded-xl">
                    --:--
                </div>
            </div>
        </div>
    </div>

    <div class="max-w-xl mx-auto px-5 mt-10">
        <div id="dashboard-grid" class="flex flex-col gap-10">
            <!-- Loading -->
            <div id="loading-state" class="text-center py-24">
                <div class="inline-block w-10 h-10 border-4 border-slate-100 border-t-blue-500 rounded-full animate-spin mb-4"></div>
                <p class="text-slate-400 text-sm font-light italic">กำลังประมวลผลข้อมูลล่าสุด...</p>
            </div>
        </div>

        <!-- Error box -->
        <div id="error-box" class="hidden mt-8 p-6 bg-white border border-red-50 border-b-4 border-b-red-200 rounded-3xl text-red-400 text-center text-sm shadow-sm">
             <i class="fas fa-wifi-slash mb-2 block text-xl"></i>
             การเชื่อมต่อขัดข้อง กำลังพยายามใหม่โดยอัตโนมัติ...
        </div>
    </div>

    <!-- Footer -->
    <div class="mt-20 text-center">
        <div class="inline-flex items-center gap-2 px-5 py-2.5 bg-white rounded-full shadow-sm border border-slate-100">
            <span class="w-2 h-2 bg-emerald-400 rounded-full status-pulse"></span>
            <span class="text-[9px] text-slate-400 uppercase tracking-[0.3em] font-medium">PTT Smart System Online</span>
        </div>
    </div>

    <script>
        // ลิงก์ CSV ที่ Publish จาก Google Sheets
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRSz-ggV9zT4RprMQNm5xU4HUU3QF_Lt2SGKDzlMYTArevwHpeokSShbclvG3YPDqfHGTbefKjEYReC/pub?output=csv';

        async function fetchSheetData() {
            try {
                const response = await fetch(`${CSV_URL}&t=${Date.now()}`);
                const csvData = await response.text();
                const rows = csvData.split(/\r?\n/)
                                 .map(line => line.split(',').map(cell => cell.replace(/^"|"$/g, '').trim()))
                                 .filter(row => row.length > 1);

                if (rows.length < 4) throw new Error("Data Error");

                const stations = [
                    { name: rows[1][0] || "บ้านกระบี่", data: rows[1] },
                    { name: rows[2][0] || "ศรีรัตนะ", data: rows[2] },
                    { name: rows[3][0] || "แยกบ้านจาน", data: rows[3] }
                ];

                renderDashboard(stations);
                document.getElementById('error-box').classList.add('hidden');
                document.getElementById('last-sync').innerText = `อัปเดต ${new Date().toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'})}`;
            } catch (error) {
                console.error(error);
                document.getElementById('error-box').classList.remove('hidden');
            }
        }

        function renderDashboard(stations) {
            const grid = document.getElementById('dashboard-grid');
            grid.innerHTML = '';

            stations.forEach(st => {
                const fuels = [
                    { label: 'DIESEL B7', pct: parseFloat(st.data[5]), color: '#2563eb', icon: 'fa-droplet' }, 
                    { label: 'GASOHOL 95', pct: parseFloat(st.data[6]), color: '#ea580c', icon: 'fa-bolt' },  
                    { label: 'GASOHOL 91', pct: parseFloat(st.data[7]), color: '#14532d', icon: 'fa-leaf' },  
                    { label: 'E20', pct: parseFloat(st.data[8]), color: '#4ade80', icon: 'fa-seedling' }      
                ];
                
                const updateTime = st.data[9] || '--';
                const plans = [
                    { label: 'Diesel', vol: parseFloat(st.data[11]) },
                    { label: '95', vol: parseFloat(st.data[12]) },
                    { label: '91', vol: parseFloat(st.data[13]) },
                    { label: 'E20', vol: parseFloat(st.data[14]) }
                ].filter(p => p.vol > 0);

                const card = document.createElement('div');
                card.className = 'fuel-card p-9';
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-10">
                        <div class="station-indicator">
                            <h2 class="text-2xl font-semibold text-slate-800 tracking-tight">${st.name}</h2>
                            <p class="text-[10px] text-slate-400 font-light mt-1 uppercase tracking-widest italic">Update: ${updateTime}</p>
                        </div>
                        <div class="w-2.5 h-2.5 bg-emerald-400 rounded-full status-pulse shadow-[0_0_10px_rgba(52,211,153,0.4)]"></div>
                    </div>

                    <div class="space-y-9">
                        ${fuels.map(f => renderGauge(f)).join('')}
                    </div>

                    ${plans.length > 0 ? `
                    <div class="mt-10 p-5 bg-slate-50/50 rounded-3xl border border-slate-100">
                        <div class="text-[9px] text-slate-400 font-bold uppercase tracking-[0.2em] mb-4 flex items-center">
                            <i class="fas fa-truck-moving mr-2 text-blue-500"></i> แผนรถน้ำมันเข้า
                        </div>
                        <div class="grid grid-cols-2 gap-y-3">
                            ${plans.map(p => `
                                <div class="text-xs text-slate-600">
                                    <span class="font-light">${p.label}:</span>
                                    <span class="font-bold text-slate-900 ml-1">${p.vol.toLocaleString()} L</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    ` : ''}
                `;
                grid.appendChild(card);
            });
        }

        function renderGauge(f) {
            let pct = f.pct;
            if (pct > 0 && pct <= 1.05) { pct = pct * 100; }
            const progress = Math.min(Math.max(pct, 0), 100);
            
            return `
                <div>
                    <div class="flex justify-between mb-3 items-end">
                        <div class="flex items-center gap-3">
                            <i class="fas ${f.icon} text-[10px] opacity-60" style="color: ${f.color}"></i>
                            <span class="text-sm font-medium text-slate-600 uppercase tracking-tight">${f.label}</span>
                        </div>
                        <div class="text-right leading-none">
                            <span class="text-3xl font-medium text-slate-800 tracking-tighter">${Math.floor(progress)}</span>
                            <span class="text-[10px] text-slate-300 font-bold ml-0.5">%</span>
                        </div>
                    </div>
                    <div class="progress-track">
                        <div class="progress-fill shadow-sm" style="width: ${progress}%; background-color: ${f.color}; opacity: 0.85;"></div>
                    </div>
                </div>
            `;
        }

        fetchSheetData();
        setInterval(fetchSheetData, 30000);
    </script>
</body>
</html>
